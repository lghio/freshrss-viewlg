services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss_local
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persistent data (config, database, cache)
      - freshrss_data:/var/www/FreshRSS/data
      # Mount the extension directly from the workspace – live reload on save
      - ./xExtension-ViewLG:/var/www/FreshRSS/extensions/xExtension-ViewLG
    environment:
      TZ: Europe/Paris
      CRON_MIN: "*/15"

volumes:
  freshrss_data:
